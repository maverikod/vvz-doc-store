name: doc-store

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: doc-store-postgres
    restart: unless-stopped
    env_file:
      - /var/doc-store/secrets/.env
    volumes:
      - /var/doc-store/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doc_store -d doc_store"]
      interval: 5s
      timeout: 5s
      retries: 30

  doc-store:
    image: vasilyvz/doc-store:${DOC_STORE_VERSION:-latest}
    container_name: doc-store
    restart: unless-stopped
    env_file:
      - /var/doc-store/secrets/.env
    environment:
      DOC_STORE_CONFIG: /etc/doc-store/config.json
      DOC_STORE_UID: ${DOC_STORE_UID:-1000}
      DOC_STORE_GID: ${DOC_STORE_GID:-1000}
      DOC_STORE_HOST: 0.0.0.0
      DOC_STORE_PORT: 8000
      DOC_STORE_PROTOCOL: https
      DOC_STORE_DEBUG: "false"
      DOC_STORE_LOG_LEVEL: info
      DOC_STORE_QUEUE_ENABLED: "true"
      DOC_STORE_DATABASE_CONNECT_TIMEOUT: 3
    volumes:
      - /etc/doc-store:/etc/doc-store
      - /var/doc-store:/var/doc-store
      - /var/log/doc-store:/var/log/doc-store
    ports:
      - "0.0.0.0:18080:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
      smart-assistant:
        aliases:
          - doc-store

networks:
  smart-assistant:
    external: true
