  type: concept_set
  description: Policy requiring model agents to read standards, source_spec, spec.yaml,
    GS and TS files, and file structure before implementation.
- name: project_structure_requirements
  type: concept_set
  description: Requirements describing the canonical separation of runtime parts,
    documentation, standards, plans, tests, migrations, and deployment units.
outputs:
- name: agent_entry_contract
  type: planning_contract
  description: A model-entry contract that tells Claude and Codex which project artifacts
    must be read before implementation work.
- name: file_structure_contract
  type: planning_contract
  description: A project-structure contract that constrains future AS and implementation
    work to the documented layout.
