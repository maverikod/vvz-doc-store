name: agent prompts and file structure
description: Define the model-agent entry contract and project structure contract.
  This tactical step ensures Claude and Codex entry prompts load the standards and
  cascade artifacts first, and that the documented project layout separates client,
  watcher, server, database, ingestion, query, vectorization, migrations, systemd,
  tests, standards, and plans.
concepts:
- C-019
- C-020
