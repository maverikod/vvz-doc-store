step_id: T-001
parent_global_step: G-001
name: standards and plan files
description: Establish the planning artifact set for doc-store. This tactical step
  makes source_spec the HRS, spec.yaml the MRS, GS files the global layer, TS files
  the tactical layer, and matrix files the materialized coverage checks required before
  AS authoring.
concepts:
- C-018
- C-019
inputs:
- name: source_spec
  type: planning_artifact
  description: Human-readable HRS with stable binding paragraph labels.
- name: machine_spec
  type: planning_artifact
  description: Machine-readable MRS containing concept identifiers, properties, relations,
    and source label bindings.
- name: planning_standards
  type: standard_set
  description: Planning standards that define cascade order, required fields, coverage
    invariants, and verification procedure.
outputs:
- name: canonical_plan_contract
  type: planning_contract
  description: A verified cascade layout with HRS, MRS, GS, TS, and matrix artifacts
    placed under the canonical plan directory.
- name: coverage_matrix_contract
  type: planning_contract
  description: The requirement that GS and TS concept coverage is represented by matrix
    artifacts before lower-level planning proceeds.
atomic_steps: []
status: draft
